<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>บันทึกรายการ</title>
  <script src="js/theme.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>body { font-family: 'Segoe UI', sans-serif; }</style>
</head>
<body class="min-h-screen pb-20">

  <header class="app-header text-white px-4 pt-10 pb-4">
    <div class="flex justify-between items-center">
      <div class="flex items-center gap-3">
        <button onclick="openDrawer()" class="hamburger-btn"><i class="fas fa-bars"></i></button>
        <h1 class="text-xl font-bold">รายการรับ-จ่าย</h1>
      </div>
      <button onclick="toggleLang()" class="text-white/60 text-sm border border-white/30 rounded-full px-3 py-1">TH/EN</button>
    </div>
    <div class="flex gap-2 mt-3">
      <button onclick="changeMonth(-1)" class="bg-white/20 text-white rounded-lg px-3 py-1 text-sm">‹</button>
      <span id="month-label" class="flex-1 text-center bg-white/20 rounded-lg py-1 text-sm font-medium"></span>
      <button onclick="changeMonth(1)" class="bg-white/20 text-white rounded-lg px-3 py-1 text-sm">›</button>
    </div>
  </header>

  <main class="px-4 py-4 space-y-3">
    <div class="grid grid-cols-3 gap-2">
      <div class="app-card rounded-xl p-3 text-center border">
        <p class="app-text-sub text-xs">รายรับ</p>
        <p id="sum-income" class="text-green-500 font-bold text-sm mt-1">฿0</p>
      </div>
      <div class="app-card rounded-xl p-3 text-center border">
        <p class="app-text-sub text-xs">รายจ่าย</p>
        <p id="sum-expense" class="text-red-500 font-bold text-sm mt-1">฿0</p>
      </div>
      <div class="app-card rounded-xl p-3 text-center border">
        <p class="app-text-sub text-xs">คงเหลือ</p>
        <p id="sum-net" class="font-bold text-sm mt-1">฿0</p>
      </div>
    </div>

    <!-- Search -->
    <div class="relative">
      <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-xs" style="color:var(--text-sub)"></i>
      <input id="tx-search" type="text" placeholder="ค้นหารายการ..."
        class="app-input w-full border rounded-xl pl-9 pr-4 py-2 text-sm focus:outline-none"
        oninput="onSearchInput(this.value)">
    </div>

    <!-- Wallet filter -->
    <div class="flex gap-2">
      <button id="wf-all" onclick="setWalletFilter('all')" class="px-3 py-1 rounded-full text-xs font-medium border">ทั้งหมด</button>
      <button id="wf-personal" onclick="setWalletFilter('personal')" class="px-3 py-1 rounded-full text-xs font-medium border">👤 ส่วนตัว</button>
      <button id="wf-family" onclick="setWalletFilter('family')" class="px-3 py-1 rounded-full text-xs font-medium border">👨‍👩‍👧 ครอบครัว</button>
    </div>

    <!-- Tab Bar -->
    <div class="flex gap-2 rounded-xl p-1" style="background:var(--divider)">
      <button id="tab-txlist" onclick="setTab('list')" class="flex-1 py-2 rounded-lg text-sm font-medium transition-all" style="background:var(--card);color:var(--primary)">รายการ</button>
      <button id="tab-budget" onclick="setTab('budget')" class="flex-1 py-2 rounded-lg text-sm font-medium transition-all" style="color:var(--text-muted)">งบประมาณ</button>
    </div>

    <!-- List view -->
    <div id="view-list">
      <div class="flex gap-2">
        <button onclick="openModal()" class="flex-1 text-white rounded-xl py-3 font-medium flex items-center justify-center gap-2 shadow-sm" style="background-color:var(--primary)">
          <i class="fas fa-plus"></i> เพิ่มรายการใหม่
        </button>
        <button onclick="openCsvImport()" class="text-white rounded-xl px-4 py-3 font-medium flex items-center gap-2 shadow-sm" style="background-color:#0891b2" title="นำเข้าจาก CSV">
          <i class="fas fa-file-import"></i>
        </button>
      </div>
    </div>

    <!-- Budget vs Actual view -->
    <div id="view-budget" class="hidden">
      <div id="budget-list">
        <div class="flex justify-center p-8"><div class="animate-spin rounded-full h-8 w-8 border-b-2" style="border-color:var(--primary)"></div></div>
      </div>
    </div>

    <div id="tx-list">
      <div class="flex justify-center p-8"><div class="animate-spin rounded-full h-8 w-8 border-b-2" style="border-color:var(--primary)"></div></div>
    </div>
  </main>

  <!-- Add Transaction Modal -->
  <div id="modal" class="modal-sheet hidden">
    <div class="modal-inner">
      <div class="modal-header">
        <h2>เพิ่มรายการ</h2>
        <button onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <!-- Type toggle -->
        <div class="flex gap-2">
          <button id="btn-income" onclick="setType('income')" class="flex-1 py-2 rounded-xl font-medium bg-green-500 text-white text-sm">รายรับ</button>
          <button id="btn-expense" onclick="setType('expense')" class="flex-1 py-2 rounded-xl font-medium text-sm" style="background:var(--bg);color:var(--text-muted)">รายจ่าย</button>
        </div>
        <!-- Amount -->
        <div>
          <label class="field-label">จำนวนเงิน (฿)</label>
          <input type="number" id="tx-amount" inputmode="decimal" placeholder="0.00"
            class="app-input w-full border rounded-xl px-4 py-3 text-lg font-bold focus:outline-none focus:ring-2" style="--tw-ring-color:var(--primary)">
        </div>
        <!-- Category (dynamic) -->
        <div>
          <label class="field-label">หมวดหมู่</label>
          <select id="tx-category" class="app-input w-full border rounded-xl px-4 py-3 focus:outline-none"></select>
        </div>
        <!-- Description -->
        <div>
          <label class="field-label">รายละเอียด</label>
          <input type="text" id="tx-desc" placeholder="เช่น ค่าอาหารเที่ยง"
            class="app-input w-full border rounded-xl px-4 py-3 focus:outline-none">
        </div>
        <!-- Wallet -->
        <div>
          <label class="field-label">กระเป๋าเงิน</label>
          <select id="tx-wallet" class="app-input w-full border rounded-xl px-4 py-3 focus:outline-none">
            <option value="personal">👤 ส่วนตัว</option>
            <option value="family">👨‍👩‍👧 ครอบครัว</option>
          </select>
        </div>
        <!-- Account -->
        <div>
          <label class="field-label">บัญชี (ไม่บังคับ)</label>
          <select id="tx-account" class="app-input w-full border rounded-xl px-4 py-3 focus:outline-none">
            <option value="">-- ไม่ระบุบัญชี --</option>
          </select>
        </div>
        <!-- Date -->
        <div>
          <label class="field-label">วันที่</label>
          <input type="date" id="tx-date"
            class="app-input w-full border rounded-xl px-4 py-3 focus:outline-none">
        </div>
      </div>
      <div class="modal-footer">
        <button onclick="saveTransaction()" id="save-btn" style="background-color:var(--primary)">
          บันทึก
        </button>
      </div>
    </div>
  </div>

  <nav class="app-nav fixed bottom-0 left-0 right-0 border-t flex justify-around py-2 z-50">
    <a href="index.html" class="flex flex-col items-center"><i class="fas fa-home text-xl"></i><span class="text-xs mt-1">หน้าหลัก</span></a>
    <a href="transactions.html" class="active flex flex-col items-center"><i class="fas fa-list text-xl"></i><span class="text-xs mt-1">รายการ</span></a>
    <a href="assets.html" class="flex flex-col items-center"><i class="fas fa-wallet text-xl"></i><span class="text-xs mt-1">ทรัพย์สิน</span></a>
    <a href="insurance.html" class="flex flex-col items-center"><i class="fas fa-shield-halved text-xl"></i><span class="text-xs mt-1">ประกัน</span></a>
    <a href="settings.html" class="flex flex-col items-center"><i class="fas fa-cog text-xl"></i><span class="text-xs mt-1">ตั้งค่า</span></a>
  </nav>

  <!-- CSV Import Modal -->
  <div id="csv-modal" class="modal-sheet hidden">
    <div class="modal-inner">
      <div class="modal-header">
        <h2><i class="fas fa-file-import mr-2" style="color:var(--primary)"></i>นำเข้าจาก CSV</h2>
        <button onclick="closeCsvModal()">✕</button>
      </div>

      <!-- Step 1: Upload / Paste -->
      <div id="csv-step1" class="modal-body">
        <div class="text-center pb-2">
          <p class="text-sm" style="color:var(--text-muted)">รองรับ KBank, SCB, KTB, BBL และ CSV ทั่วไป</p>
        </div>

        <label class="block w-full border-2 border-dashed rounded-xl p-5 text-center cursor-pointer mb-3" style="border-color:var(--divider)">
          <i class="fas fa-cloud-upload-alt text-2xl mb-2 block" style="color:var(--text-sub)"></i>
          <span class="text-sm" style="color:var(--text-muted)">แตะเพื่อเลือกไฟล์ .csv</span>
          <input type="file" id="csv-file" accept=".csv,.txt" class="hidden" onchange="onCsvFileSelect(this)">
        </label>

        <div class="flex items-center gap-2 mb-3">
          <div class="flex-1 h-px" style="background:var(--divider)"></div>
          <span class="text-xs" style="color:var(--text-sub)">หรือวางข้อความ</span>
          <div class="flex-1 h-px" style="background:var(--divider)"></div>
        </div>

        <textarea id="csv-paste" rows="6"
          placeholder="วาง CSV ตรงนี้...&#10;date,description,debit,credit&#10;2025-01-05,ค่าอาหาร,250,&#10;2025-01-05,เงินเดือน,,30000"
          class="app-input w-full border rounded-xl px-3 py-2 text-xs focus:outline-none"
          style="font-family:monospace;resize:none"></textarea>

        <button onclick="downloadCsvTemplate()" class="text-xs flex items-center gap-1 mt-2" style="color:var(--primary)">
          <i class="fas fa-download"></i> ดาวน์โหลด Template
        </button>
      </div>

      <!-- Step 2: Preview & Confirm -->
      <div id="csv-step2" class="modal-body hidden">
        <div id="csv-detect-info" class="rounded-xl p-3 mb-3 text-xs" style="background:var(--divider);color:var(--text)"></div>

        <div class="grid grid-cols-2 gap-3 mb-3">
          <div>
            <label class="field-label">หมวดหมู่ (รายจ่าย)</label>
            <select id="csv-cat" onchange="reprocessCsv()" class="app-input w-full border rounded-xl px-3 py-2 text-sm focus:outline-none">
              <option value="อื่นๆ">อื่นๆ</option>
              <option value="อาหาร/เครื่องดื่ม">อาหาร/เครื่องดื่ม</option>
              <option value="เดินทาง/น้ำมัน">เดินทาง/น้ำมัน</option>
              <option value="ที่พัก/บ้าน">ที่พัก/บ้าน</option>
              <option value="สุขภาพ">สุขภาพ</option>
              <option value="บันเทิง">บันเทิง</option>
              <option value="ช้อปปิ้ง">ช้อปปิ้ง</option>
              <option value="หนี้/ผ่อน">หนี้/ผ่อน</option>
            </select>
          </div>
          <div>
            <label class="field-label">กระเป๋าเงิน</label>
            <select id="csv-wallet" onchange="reprocessCsv()" class="app-input w-full border rounded-xl px-3 py-2 text-sm focus:outline-none">
              <option value="personal">👤 ส่วนตัว</option>
              <option value="family">👨‍👩‍👧 ครอบครัว</option>
            </select>
          </div>
        </div>

        <p class="text-xs font-semibold mb-1" style="color:var(--text-sub)">ตัวอย่าง 5 รายการแรก</p>
        <div id="csv-preview" class="rounded-xl border overflow-hidden mb-2" style="border-color:var(--divider)"></div>
        <p id="csv-count" class="text-sm font-semibold text-center" style="color:var(--primary)"></p>
      </div>

      <div class="modal-footer flex gap-2" id="csv-footer"></div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/transactions.js"></script>
  <script src="js/csv-import.js"></script>
  <script src="js/nav.js"></script>
</body>
</html>
