<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>บันทึกรายการ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>body { font-family: 'Segoe UI', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen pb-20">

  <header class="bg-gradient-to-r from-blue-600 to-blue-800 text-white px-4 pt-10 pb-6">
    <div class="flex justify-between items-center">
      <h1 class="text-xl font-bold">รายการรับ-จ่าย</h1>
      <button onclick="toggleLang()" class="text-blue-200 text-sm border border-blue-400 rounded-full px-3 py-1">TH/EN</button>
    </div>
    <!-- Month selector -->
    <div class="flex gap-2 mt-3">
      <button onclick="changeMonth(-1)" class="bg-blue-700 text-white rounded-lg px-3 py-1 text-sm">‹</button>
      <span id="month-label" class="flex-1 text-center bg-blue-700 rounded-lg py-1 text-sm font-medium"></span>
      <button onclick="changeMonth(1)" class="bg-blue-700 text-white rounded-lg px-3 py-1 text-sm">›</button>
    </div>
  </header>

  <main class="px-4 py-4 space-y-4">

    <!-- Summary Bar -->
    <div class="grid grid-cols-3 gap-2">
      <div class="bg-green-50 rounded-xl p-3 text-center">
        <p class="text-xs text-gray-500">รายรับ</p>
        <p id="sum-income" class="text-green-600 font-bold text-sm mt-1">฿0</p>
      </div>
      <div class="bg-red-50 rounded-xl p-3 text-center">
        <p class="text-xs text-gray-500">รายจ่าย</p>
        <p id="sum-expense" class="text-red-500 font-bold text-sm mt-1">฿0</p>
      </div>
      <div class="bg-blue-50 rounded-xl p-3 text-center">
        <p class="text-xs text-gray-500">คงเหลือ</p>
        <p id="sum-net" class="text-blue-600 font-bold text-sm mt-1">฿0</p>
      </div>
    </div>

    <!-- Add Transaction Button -->
    <button onclick="openModal()" class="w-full bg-blue-500 text-white rounded-xl py-3 font-medium flex items-center justify-center gap-2 shadow-sm">
      <i class="fas fa-plus"></i> เพิ่มรายการใหม่
    </button>

    <!-- Transactions List -->
    <div id="tx-list">
      <div class="flex justify-center p-8"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div></div>
    </div>

  </main>

  <!-- Add Transaction Modal -->
  <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-end">
    <div class="bg-white rounded-t-3xl w-full p-6 space-y-4">
      <div class="flex justify-between items-center">
        <h2 class="text-lg font-bold">เพิ่มรายการ</h2>
        <button onclick="closeModal()" class="text-gray-400 text-xl">✕</button>
      </div>

      <!-- Type Toggle -->
      <div class="flex gap-2">
        <button id="btn-income" onclick="setType('income')" class="flex-1 py-2 rounded-xl font-medium bg-green-500 text-white text-sm">รายรับ</button>
        <button id="btn-expense" onclick="setType('expense')" class="flex-1 py-2 rounded-xl font-medium bg-gray-200 text-gray-600 text-sm">รายจ่าย</button>
      </div>

      <div>
        <label class="text-sm text-gray-600">จำนวนเงิน (฿)</label>
        <input type="number" id="tx-amount" inputmode="decimal" placeholder="0.00"
          class="w-full mt-1 border border-gray-300 rounded-xl px-4 py-3 text-lg font-bold focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>

      <div>
        <label class="text-sm text-gray-600">หมวดหมู่</label>
        <select id="tx-category" class="w-full mt-1 border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400">
          <option value="เงินเดือน">เงินเดือน</option>
          <option value="รายได้อื่น">รายได้อื่น</option>
          <option value="อาหาร">อาหาร</option>
          <option value="เดินทาง">เดินทาง</option>
          <option value="บ้าน">บ้าน</option>
          <option value="สุขภาพ">สุขภาพ</option>
          <option value="บันเทิง">บันเทิง</option>
          <option value="ออม/ลงทุน">ออม/ลงทุน</option>
          <option value="อื่นๆ">อื่นๆ</option>
        </select>
      </div>

      <div>
        <label class="text-sm text-gray-600">รายละเอียด</label>
        <input type="text" id="tx-desc" placeholder="เช่น ค่าอาหารเที่ยง"
          class="w-full mt-1 border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>

      <div>
        <label class="text-sm text-gray-600">วันที่</label>
        <input type="date" id="tx-date"
          class="w-full mt-1 border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>

      <button onclick="saveTransaction()" id="save-btn"
        class="w-full bg-blue-500 text-white rounded-xl py-3 font-bold text-lg shadow-sm">
        บันทึก
      </button>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around py-2 z-50">
    <a href="index.html" class="flex flex-col items-center text-gray-400"><i class="fas fa-home text-xl"></i><span class="text-xs mt-1">หน้าหลัก</span></a>
    <a href="transactions.html" class="flex flex-col items-center text-blue-600"><i class="fas fa-list text-xl"></i><span class="text-xs mt-1">รายการ</span></a>
    <a href="cashflow.html" class="flex flex-col items-center text-gray-400"><i class="fas fa-gamepad text-xl"></i><span class="text-xs mt-1">Cashflow</span></a>
    <a href="assets.html" class="flex flex-col items-center text-gray-400"><i class="fas fa-wallet text-xl"></i><span class="text-xs mt-1">ทรัพย์สิน</span></a>
    <a href="goals.html" class="flex flex-col items-center text-gray-400"><i class="fas fa-bullseye text-xl"></i><span class="text-xs mt-1">เป้าหมาย</span></a>
  </nav>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/transactions.js"></script>
</body>
</html>
