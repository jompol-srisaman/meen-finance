<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>บันทึกรายการ</title>
  <script src="js/theme.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>body { font-family: 'Segoe UI', sans-serif; }</style>
</head>
<body class="min-h-screen pb-20">

  <header class="app-header text-white px-4 pt-10 pb-4">
    <div class="flex justify-between items-center">
      <h1 class="text-xl font-bold">รายการรับ-จ่าย</h1>
      <button onclick="toggleLang()" class="text-white/60 text-sm border border-white/30 rounded-full px-3 py-1">TH/EN</button>
    </div>
    <div class="flex gap-2 mt-3">
      <button onclick="changeMonth(-1)" class="bg-white/20 text-white rounded-lg px-3 py-1 text-sm">‹</button>
      <span id="month-label" class="flex-1 text-center bg-white/20 rounded-lg py-1 text-sm font-medium"></span>
      <button onclick="changeMonth(1)" class="bg-white/20 text-white rounded-lg px-3 py-1 text-sm">›</button>
    </div>
  </header>

  <main class="px-4 py-4 space-y-3">
    <div class="grid grid-cols-3 gap-2">
      <div class="app-card rounded-xl p-3 text-center border">
        <p class="app-text-sub text-xs">รายรับ</p>
        <p id="sum-income" class="text-green-500 font-bold text-sm mt-1">฿0</p>
      </div>
      <div class="app-card rounded-xl p-3 text-center border">
        <p class="app-text-sub text-xs">รายจ่าย</p>
        <p id="sum-expense" class="text-red-500 font-bold text-sm mt-1">฿0</p>
      </div>
      <div class="app-card rounded-xl p-3 text-center border">
        <p class="app-text-sub text-xs">คงเหลือ</p>
        <p id="sum-net" class="font-bold text-sm mt-1">฿0</p>
      </div>
    </div>

    <!-- Wallet filter -->
    <div class="flex gap-2">
      <button id="wf-all" onclick="setWalletFilter('all')" class="px-3 py-1 rounded-full text-xs font-medium border">ทั้งหมด</button>
      <button id="wf-personal" onclick="setWalletFilter('personal')" class="px-3 py-1 rounded-full text-xs font-medium border">👤 ส่วนตัว</button>
      <button id="wf-family" onclick="setWalletFilter('family')" class="px-3 py-1 rounded-full text-xs font-medium border">👨‍👩‍👧 ครอบครัว</button>
    </div>

    <button onclick="openModal()" class="w-full text-white rounded-xl py-3 font-medium flex items-center justify-center gap-2 shadow-sm" style="background-color:var(--primary)">
      <i class="fas fa-plus"></i> เพิ่มรายการใหม่
    </button>

    <div id="tx-list">
      <div class="flex justify-center p-8"><div class="animate-spin rounded-full h-8 w-8 border-b-2" style="border-color:var(--primary)"></div></div>
    </div>
  </main>

  <!-- Add Transaction Modal -->
  <div id="modal" class="modal-sheet hidden">
    <div class="modal-inner">
      <div class="modal-header">
        <h2>เพิ่มรายการ</h2>
        <button onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <!-- Type toggle -->
        <div class="flex gap-2">
          <button id="btn-income" onclick="setType('income')" class="flex-1 py-2 rounded-xl font-medium bg-green-500 text-white text-sm">รายรับ</button>
          <button id="btn-expense" onclick="setType('expense')" class="flex-1 py-2 rounded-xl font-medium text-sm" style="background:var(--bg);color:var(--text-muted)">รายจ่าย</button>
        </div>
        <!-- Amount -->
        <div>
          <label class="field-label">จำนวนเงิน (฿)</label>
          <input type="number" id="tx-amount" inputmode="decimal" placeholder="0.00"
            class="app-input w-full border rounded-xl px-4 py-3 text-lg font-bold focus:outline-none focus:ring-2" style="--tw-ring-color:var(--primary)">
        </div>
        <!-- Category (dynamic) -->
        <div>
          <label class="field-label">หมวดหมู่</label>
          <select id="tx-category" class="app-input w-full border rounded-xl px-4 py-3 focus:outline-none"></select>
        </div>
        <!-- Description -->
        <div>
          <label class="field-label">รายละเอียด</label>
          <input type="text" id="tx-desc" placeholder="เช่น ค่าอาหารเที่ยง"
            class="app-input w-full border rounded-xl px-4 py-3 focus:outline-none">
        </div>
        <!-- Wallet -->
        <div>
          <label class="field-label">กระเป๋าเงิน</label>
          <select id="tx-wallet" class="app-input w-full border rounded-xl px-4 py-3 focus:outline-none">
            <option value="personal">👤 ส่วนตัว</option>
            <option value="family">👨‍👩‍👧 ครอบครัว</option>
          </select>
        </div>
        <!-- Date -->
        <div>
          <label class="field-label">วันที่</label>
          <input type="date" id="tx-date"
            class="app-input w-full border rounded-xl px-4 py-3 focus:outline-none">
        </div>
      </div>
      <div class="modal-footer">
        <button onclick="saveTransaction()" id="save-btn" style="background-color:var(--primary)">
          บันทึก
        </button>
      </div>
    </div>
  </div>

  <nav class="app-nav fixed bottom-0 left-0 right-0 border-t flex justify-around py-2 z-50">
    <a href="index.html" class="flex flex-col items-center"><i class="fas fa-home text-xl"></i><span class="text-xs mt-1">หน้าหลัก</span></a>
    <a href="transactions.html" class="active flex flex-col items-center"><i class="fas fa-list text-xl"></i><span class="text-xs mt-1">รายการ</span></a>
    <a href="assets.html" class="flex flex-col items-center"><i class="fas fa-wallet text-xl"></i><span class="text-xs mt-1">ทรัพย์สิน</span></a>
    <a href="insurance.html" class="flex flex-col items-center"><i class="fas fa-shield-halved text-xl"></i><span class="text-xs mt-1">ประกัน</span></a>
    <a href="settings.html" class="flex flex-col items-center"><i class="fas fa-cog text-xl"></i><span class="text-xs mt-1">ตั้งค่า</span></a>
  </nav>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/transactions.js"></script>
</body>
</html>
