<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>เป้าหมายการเงิน</title>
  <script src="js/theme.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>body { font-family: 'Segoe UI', sans-serif; }</style>
</head>
<body class="min-h-screen pb-20">

  <header class="app-header text-white px-4 pt-10 pb-4" style="background:linear-gradient(135deg,#f97316,#c2410c)">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button onclick="openDrawer()" class="hamburger-btn"><i class="fas fa-bars"></i></button>
        <div>
          <h1 class="text-xl font-bold">เป้าหมายการเงิน</h1>
          <p class="text-orange-200 text-xs mt-0.5">ตั้งเป้า ติดตาม สำเร็จ</p>
        </div>
      </div>
      <button onclick="toggleLang()" class="text-orange-200 text-sm border border-orange-300/50 rounded-full px-3 py-1">TH/EN</button>
    </div>

    <!-- Summary chips -->
    <div class="flex gap-2 mt-3">
      <div class="bg-white/20 rounded-xl px-3 py-2 text-center flex-1">
        <p class="text-white/60 text-xs">ทั้งหมด</p>
        <p id="sum-total" class="font-bold text-sm">0</p>
      </div>
      <div class="bg-white/20 rounded-xl px-3 py-2 text-center flex-1">
        <p class="text-white/60 text-xs">ใกล้ถึง ⚡</p>
        <p id="sum-approaching" class="font-bold text-sm text-yellow-200">0</p>
      </div>
      <div class="bg-white rounded-xl px-3 py-2 text-center flex-1">
        <p class="text-xs" style="color:var(--text-muted)">สำเร็จ 🏆</p>
        <p id="sum-completed" class="font-bold text-sm text-green-600">0</p>
      </div>
    </div>
  </header>

  <main class="px-4 py-4 space-y-3">
    <!-- Add + Auto-sync buttons -->
    <div class="flex gap-2">
      <button onclick="openModal()" class="flex-1 text-white rounded-xl py-3 font-medium flex items-center justify-center gap-2 shadow-sm bg-orange-500">
        <i class="fas fa-plus"></i> เพิ่มเป้าหมาย
      </button>
      <button onclick="syncGoals()" id="sync-btn" class="text-white rounded-xl px-4 py-3 font-medium flex items-center gap-2 shadow-sm" style="background:var(--primary)">
        <i class="fas fa-sync-alt"></i><span class="text-sm">อัปเดต</span>
      </button>
    </div>

    <!-- Filter tabs -->
    <div class="flex gap-2">
      <button id="f-all" onclick="setFilter('all')" class="px-3 py-1 rounded-full text-xs font-medium border">ทั้งหมด</button>
      <button id="f-approaching" onclick="setFilter('approaching')" class="px-3 py-1 rounded-full text-xs font-medium border">⚡ ใกล้ถึง</button>
      <button id="f-active" onclick="setFilter('active')" class="px-3 py-1 rounded-full text-xs font-medium border">📈 กำลังทำ</button>
      <button id="f-completed" onclick="setFilter('completed')" class="px-3 py-1 rounded-full text-xs font-medium border">🏆 สำเร็จ</button>
    </div>

    <!-- Goals container -->
    <div id="goals-container">
      <div class="flex justify-center p-8"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-orange-500"></div></div>
    </div>
  </main>

  <!-- Add Goal Modal -->
  <div id="modal" class="modal-sheet hidden">
    <div class="modal-inner">
      <div class="modal-header">
        <h2>เพิ่มเป้าหมาย</h2>
        <button onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div>
          <label class="field-label">ชื่อเป้าหมาย <span class="text-red-400">*</span></label>
          <input type="text" id="g-name" placeholder="เช่น กองทุนฉุกเฉิน 6 เดือน" class="app-input w-full border rounded-xl px-4 py-3 focus:outline-none">
        </div>
        <div>
          <label class="field-label">ประเภท</label>
          <select id="g-type" class="app-input w-full border rounded-xl px-4 py-3 focus:outline-none">
            <option value="savings">💰 เงินออม</option>
            <option value="emergency_fund">🛡 กองทุนฉุกเฉิน</option>
            <option value="investment">📈 การลงทุน</option>
            <option value="debt_payoff">💳 ปิดหนี้</option>
            <option value="monthly_cashflow">💵 Cashflow รายเดือน</option>
            <option value="other">🎯 อื่นๆ</option>
          </select>
        </div>
        <div>
          <label class="field-label">จำนวนเป้าหมาย (฿) <span class="text-red-400">*</span></label>
          <input type="number" id="g-target" inputmode="decimal" placeholder="0" class="app-input w-full border rounded-xl px-4 py-3 text-lg font-bold focus:outline-none">
        </div>
        <div>
          <label class="field-label">มีแล้วตอนนี้ (฿)</label>
          <input type="number" id="g-current" inputmode="decimal" placeholder="0" class="app-input w-full border rounded-xl px-4 py-3 focus:outline-none">
        </div>
        <div>
          <label class="field-label">วันที่เป้าหมาย</label>
          <input type="date" id="g-date" class="app-input w-full border rounded-xl px-4 py-3 focus:outline-none">
        </div>
        <div>
          <label class="field-label">กระเป๋าเงิน</label>
          <select id="g-wallet" class="app-input w-full border rounded-xl px-4 py-3 focus:outline-none">
            <option value="personal">👤 ส่วนตัว</option>
            <option value="family">👨‍👩‍👧 ครอบครัว</option>
          </select>
        </div>
        <div>
          <label class="field-label">หมายเหตุ</label>
          <input type="text" id="g-notes" placeholder="เช่น ออมเดือนละ 5,000 บาท" class="app-input w-full border rounded-xl px-4 py-3 focus:outline-none">
        </div>
      </div>
      <div class="modal-footer">
        <button onclick="saveGoal()" id="goal-save-btn" class="bg-orange-500">บันทึก</button>
      </div>
    </div>
  </div>

  <!-- Update Progress Modal -->
  <div id="update-modal" class="modal-sheet hidden">
    <div class="modal-inner">
      <div class="modal-header">
        <h2 id="pu-title">อัพเดทความก้าวหน้า</h2>
        <button onclick="closeUpdateModal()">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="pu-id">
        <div>
          <label class="field-label">ยอดปัจจุบัน (฿)</label>
          <input type="number" id="pu-amount" inputmode="decimal" class="app-input w-full border rounded-xl px-4 py-3 text-2xl font-bold focus:outline-none">
        </div>
      </div>
      <div class="modal-footer">
        <button onclick="saveUpdate()" id="update-save-btn" class="bg-orange-500">อัพเดท</button>
      </div>
    </div>
  </div>

  <nav class="app-nav fixed bottom-0 left-0 right-0 border-t flex justify-around py-2 z-50">
    <a href="index.html" class="flex flex-col items-center"><i class="fas fa-home text-xl"></i><span class="text-xs mt-1">หน้าหลัก</span></a>
    <a href="transactions.html" class="flex flex-col items-center"><i class="fas fa-list text-xl"></i><span class="text-xs mt-1">รายการ</span></a>
    <a href="assets.html" class="flex flex-col items-center"><i class="fas fa-wallet text-xl"></i><span class="text-xs mt-1">ทรัพย์สิน</span></a>
    <a href="insurance.html" class="flex flex-col items-center"><i class="fas fa-shield-halved text-xl"></i><span class="text-xs mt-1">ประกัน</span></a>
    <a href="settings.html" class="flex flex-col items-center"><i class="fas fa-cog text-xl"></i><span class="text-xs mt-1">ตั้งค่า</span></a>
  </nav>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/goals.js"></script>
  <script src="js/nav.js"></script>
</body>
</html>
