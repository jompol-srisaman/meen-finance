<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>เป้าหมายการเงิน</title>
  <script src="js/theme.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>body { font-family: 'Segoe UI', sans-serif; }</style>
</head>
<body class="min-h-screen pb-20">

  <header class="app-header text-white px-4 pt-10 pb-6" style="background:linear-gradient(to right,#f97316,#c2410c)">
    <div class="flex justify-between items-center">
      <div>
        <h1 class="text-xl font-bold">เป้าหมายการเงิน 🎯</h1>
        <p class="text-orange-200 text-sm mt-0.5">ตั้งเป้าหมาย ติดตามความก้าวหน้า</p>
      </div>
      <button onclick="toggleLang()" class="text-orange-200 text-sm border border-orange-400 rounded-full px-3 py-1">TH/EN</button>
    </div>
  </header>

  <main class="px-4 py-4 space-y-4">
    <button onclick="openModal()" class="w-full bg-orange-500 text-white rounded-xl py-3 font-medium flex items-center justify-center gap-2 shadow-sm">
      <i class="fas fa-plus"></i> เพิ่มเป้าหมายใหม่
    </button>
    <div id="goals-list"><div class="flex justify-center p-8"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-orange-500"></div></div></div>
  </main>

  <!-- Add Goal Modal -->
  <div id="modal" class="modal-sheet hidden">
    <div class="modal-inner">
      <div class="modal-header"><h2>เพิ่มเป้าหมาย</h2><button onclick="closeModal()">✕</button></div>
      <div class="modal-body">
        <div><label class="field-label">ชื่อเป้าหมาย</label><input type="text" id="g-name" placeholder="เช่น กองทุนฉุกเฉิน" class="app-input w-full border rounded-xl px-4 py-3 focus:outline-none"></div>
        <div><label class="field-label">ประเภท</label><select id="g-type" class="app-input w-full border rounded-xl px-4 py-3 focus:outline-none">
          <option value="savings">เงินออม</option>
          <option value="emergency_fund">กองทุนฉุกเฉิน</option>
          <option value="investment">การลงทุน</option>
          <option value="debt_payoff">ปิดหนี้</option>
        </select></div>
        <div><label class="field-label">เป้าหมาย (฿)</label><input type="number" id="g-target" inputmode="decimal" placeholder="0" class="app-input w-full border rounded-xl px-4 py-3 focus:outline-none"></div>
        <div><label class="field-label">มีแล้วตอนนี้ (฿)</label><input type="number" id="g-current" inputmode="decimal" placeholder="0" class="app-input w-full border rounded-xl px-4 py-3 focus:outline-none"></div>
        <div><label class="field-label">วันที่เป้าหมาย</label><input type="date" id="g-date" class="app-input w-full border rounded-xl px-4 py-3 focus:outline-none"></div>
      </div>
      <div class="modal-footer"><button onclick="saveGoal()" class="bg-orange-500">บันทึก</button></div>
    </div>
  </div>

  <!-- Update Progress Modal -->
  <div id="progress-modal" class="modal-sheet hidden">
    <div class="modal-inner">
      <div class="modal-header"><h2 id="progress-title">อัพเดทความก้าวหน้า</h2><button onclick="closeProgressModal()">✕</button></div>
      <div class="modal-body">
        <input type="hidden" id="progress-id">
        <div><label class="field-label">ยอดปัจจุบัน (฿)</label>
        <input type="number" id="progress-amount" inputmode="decimal" class="app-input w-full border rounded-xl px-4 py-3 text-xl font-bold focus:outline-none"></div>
      </div>
      <div class="modal-footer"><button onclick="saveProgress()" class="bg-orange-500">อัพเดท</button></div>
    </div>
  </div>

  <nav class="app-nav fixed bottom-0 left-0 right-0 border-t flex justify-around py-2 z-50">
    <a href="index.html" class="flex flex-col items-center"><i class="fas fa-home text-xl"></i><span class="text-xs mt-1">หน้าหลัก</span></a>
    <a href="transactions.html" class="flex flex-col items-center"><i class="fas fa-list text-xl"></i><span class="text-xs mt-1">รายการ</span></a>
    <a href="assets.html" class="flex flex-col items-center"><i class="fas fa-wallet text-xl"></i><span class="text-xs mt-1">ทรัพย์สิน</span></a>
    <a href="insurance.html" class="flex flex-col items-center"><i class="fas fa-shield-halved text-xl"></i><span class="text-xs mt-1">ประกัน</span></a>
    <a href="settings.html" class="flex flex-col items-center"><i class="fas fa-cog text-xl"></i><span class="text-xs mt-1">ตั้งค่า</span></a>
  </nav>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/goals.js"></script>
</body>
</html>
