<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>เป้าหมายการเงิน</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>body { font-family: 'Segoe UI', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen pb-20">

  <header class="bg-gradient-to-r from-orange-500 to-orange-700 text-white px-4 pt-10 pb-6">
    <div class="flex justify-between items-center">
      <h1 class="text-xl font-bold">เป้าหมายการเงิน 🎯</h1>
      <button onclick="toggleLang()" class="text-orange-200 text-sm border border-orange-400 rounded-full px-3 py-1">TH/EN</button>
    </div>
    <p class="text-orange-200 text-sm mt-1">ตั้งเป้าหมาย ติดตามความก้าวหน้า</p>
  </header>

  <main class="px-4 py-4 space-y-4">

    <button onclick="openModal()" class="w-full bg-orange-500 text-white rounded-xl py-3 font-medium flex items-center justify-center gap-2 shadow-sm">
      <i class="fas fa-plus"></i> เพิ่มเป้าหมายใหม่
    </button>

    <div id="goals-list">
      <div class="flex justify-center p-8"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-orange-500"></div></div>
    </div>

  </main>

  <!-- Add Goal Modal -->
  <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-end">
    <div class="bg-white rounded-t-3xl w-full p-6 space-y-4">
      <div class="flex justify-between items-center">
        <h2 class="text-lg font-bold">เพิ่มเป้าหมาย</h2>
        <button onclick="closeModal()" class="text-gray-400 text-xl">✕</button>
      </div>

      <input type="text" id="g-name" placeholder="ชื่อเป้าหมาย เช่น กองทุนฉุกเฉิน"
        class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-orange-400">

      <select id="g-type" class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-orange-400">
        <option value="savings">เงินออม</option>
        <option value="emergency_fund">กองทุนฉุกเฉิน</option>
        <option value="investment">การลงทุน</option>
        <option value="debt_payoff">ปิดหนี้</option>
      </select>

      <div>
        <label class="text-sm text-gray-600">เป้าหมาย (฿)</label>
        <input type="number" id="g-target" inputmode="decimal" placeholder="0"
          class="w-full mt-1 border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-orange-400">
      </div>

      <div>
        <label class="text-sm text-gray-600">มีแล้วตอนนี้ (฿)</label>
        <input type="number" id="g-current" inputmode="decimal" placeholder="0"
          class="w-full mt-1 border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-orange-400">
      </div>

      <div>
        <label class="text-sm text-gray-600">วันที่เป้าหมาย</label>
        <input type="date" id="g-date"
          class="w-full mt-1 border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-orange-400">
      </div>

      <button onclick="saveGoal()" class="w-full bg-orange-500 text-white rounded-xl py-3 font-bold">บันทึก</button>
    </div>
  </div>

  <!-- Update Progress Modal -->
  <div id="progress-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-end">
    <div class="bg-white rounded-t-3xl w-full p-6 space-y-4">
      <div class="flex justify-between items-center">
        <h2 class="text-lg font-bold" id="progress-title">อัพเดทความก้าวหน้า</h2>
        <button onclick="closeProgressModal()" class="text-gray-400 text-xl">✕</button>
      </div>
      <input type="hidden" id="progress-id">
      <div>
        <label class="text-sm text-gray-600">ยอดปัจจุบัน (฿)</label>
        <input type="number" id="progress-amount" inputmode="decimal"
          class="w-full mt-1 border border-gray-300 rounded-xl px-4 py-3 text-xl font-bold focus:outline-none focus:ring-2 focus:ring-orange-400">
      </div>
      <button onclick="saveProgress()" class="w-full bg-orange-500 text-white rounded-xl py-3 font-bold">อัพเดท</button>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around py-2 z-50">
    <a href="index.html" class="flex flex-col items-center text-gray-400"><i class="fas fa-home text-xl"></i><span class="text-xs mt-1">หน้าหลัก</span></a>
    <a href="transactions.html" class="flex flex-col items-center text-gray-400"><i class="fas fa-list text-xl"></i><span class="text-xs mt-1">รายการ</span></a>
    <a href="cashflow.html" class="flex flex-col items-center text-gray-400"><i class="fas fa-gamepad text-xl"></i><span class="text-xs mt-1">Cashflow</span></a>
    <a href="assets.html" class="flex flex-col items-center text-gray-400"><i class="fas fa-wallet text-xl"></i><span class="text-xs mt-1">ทรัพย์สิน</span></a>
    <a href="goals.html" class="flex flex-col items-center text-orange-500"><i class="fas fa-bullseye text-xl"></i><span class="text-xs mt-1">เป้าหมาย</span></a>
  </nav>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/goals.js"></script>
</body>
</html>
